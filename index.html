<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="script.js"></script>
</head>

<body>

    <div id="page_container">

        <div id="container_input_id_utilisateur">
            <input type="text" id="input_id_utilisateur" class="input" placeholder="rentrer quel utilisateur est connecté">
            <button type="text" id="button_id_utilisateur" class="button">Valider</button>
        </div>

        <div id="container_infos_utilisateur" class="container_page_principale">
            <div id="container_nom_utilisateur">
                <div id="prenom_utilisateur" class="titre_section">Prenom</div>
                <div id="nom_utilisateur">Nom</div>
            </div>

            <div id="photo_profil"></div>
        </div>

        <div id="hidden_templates">
            <div class="item_offre_emploi" id="template_offre" id_offre_emploi="">
                <div class="text_container_item_offre_emploi">
                    <p class="item_offre_emploi_top"   >Nom offre</p>
                    <p class="item_offre_emploi_bottom">Nom entreprise</p>
                </div>
                <button class="item_offre_emploi_delete hidden">🗑️</button>
            </div>
        </div>

        <div id="container_mes_offres" class="container_page_principale">
            <div>Mes offres</div>
            
            <div id="liste_mes_offres" class="liste_offre">

            </div>
        </div>

        <div id="container_input_ajouter_offre">
            <input type="text" id="input_nom_offre" class="input" placeholder="Nom du poste">
            <input type="text" id="input_nom_employeur" class="input" placeholder="Nom de l'employeur">
            <button class="button" id="bouton_ajouter_offre">Ajouter l'offre d'emploi</button>
        </div>

        <div id="container_offre_emploi" class="container_page_principale">
            <div>Offres d'emploi</div>
            
            <div id="liste_offre_emploi" class="liste_offre">

            </div>
        </div>


    </div>


</body>
</html>
